services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: pell
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: ghcr.io/tann007-aa/tarkvaraarenduse-projekt-salme-saaga--backend:feat-saves-progression
    restart: always
    environment:
      DATABASE_URL: mysql://root:password@db:3306/pell
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    image: ghcr.io/tann007-aa/tarkvaraarenduse-projekt-salme-saaga--frontend:feat-saves-progression
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
